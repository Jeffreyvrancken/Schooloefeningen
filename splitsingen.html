
<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splitsen 0-20</title>
<style>
:root{
  --bg:#f3f4f6;
  --card:#ffffff;
  --ok:#16a34a;
  --bad:#dc2626;
  --accent:#4f46e5;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family: system-ui, sans-serif;
  background:var(--bg);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:12px;
}

.container{
  width:100%;
  max-width:520px;
  background:var(--card);
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
  padding:clamp(14px, 4vw, 24px);
  text-align:center;
}

.progress{
  background:#e5e7eb;
  border-radius:10px;
  overflow:hidden;
  height:12px;
  margin-bottom:8px;
}
.bar{
  background:var(--accent);
  height:100%;
  width:0%;
  transition:width .3s;
}

#counter{
  font-size:clamp(14px, 4vw, 16px);
  margin-bottom:6px;
}

.number{
  background:#e0e7ff;
  border-radius:18px;
  padding:12px 20px;
  font-size:clamp(40px, 10vw, 64px);
  font-weight:700;
  display:inline-block;
}

.split-space{
  position:relative;
  height:80px;
  margin:12px 0 10px;
}

.split-space::before,
.split-space::after{
  content:"";
  position:absolute;
  bottom:0;
  width:2px;
  height:70px;
  background:#9ca3af;
}

.split-space::before{
  left:50%;
  transform:rotate(30deg) translateX(-20px);
}

.split-space::after{
  left:50%;
  transform:rotate(-30deg) translateX(20px);
}

.bottom{
  display:flex;
  justify-content:center;
  gap:clamp(40px, 12vw, 120px);
  margin-bottom:10px;
}

.bottom .number{
  font-size:clamp(32px, 8vw, 48px);
  min-width:90px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:clamp(8px, 2.5vw, 12px);
  margin-top:14px;
}

button{
  font-size:clamp(18px, 6vw, 24px);
  padding:clamp(12px, 4vw, 18px);
  border-radius:16px;
  border:none;
  background:#e5e7eb;
}

button.primary{
  background:#c7d2fe;
}

button:active{ transform:scale(.96); }

.feedback{
  min-height:64px;
  font-size:clamp(34px, 8vw, 44px);
  margin-top:14px;
}

.correct{ color:var(--ok); }
.wrong{ color:var(--bad); }

.answer-reveal{
  display:block;
  font-size:clamp(22px, 6vw, 32px);
  margin-top:0px;
  color:#1f2937;
}

.flash-correct{ background:#bbf7d0 !important; }
.flash-wrong{ background:#fecaca !important; }

.actions{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:16px;
}

@media (min-width: 900px){
  body{ align-items:center; }
}

/* ===== FIXED TOP TIMER ===== */
.page-column{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-top:60px;
}

.exercise-timer-wrapper{
  position:fixed;
  top:6px;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  display:flex;
  justify-content:center;
  z-index:1000;
}

.exercise-timer{
  width:100%;
  max-width:520px;
  height:10px;
  background:#e5e7eb;
  border-radius:999px;
  overflow:hidden;
}

.exercise-timer-bar{
  height:100%;
  width:100%;
  background:#60a5fa;
  transition:width 0.05s linear;
}

.container{
  margin-top:0 !important;
}


/* ===== RESULT CLOSURE ANIMATION ===== */
.result-enter{
  opacity:0;
  transform:translateY(10px);
  animation:resultIn .35s ease forwards;
}

@keyframes resultIn{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>
</head>
<body>

<div class="exercise-timer-wrapper">
  <div class="exercise-timer">
    <div class="exercise-timer-bar" id="exerciseTimerBar"></div>
  </div>
</div>

<div class="page-column" id="app">
<div class="container">
  <div class="progress"><div class="bar" id="bar"></div></div>
  <div id="counter"></div>

  <div class="number" id="total"></div>

  <div class="split-space"></div>

  <div class="bottom">
    <div class="number" id="left"></div>
    <div class="number" id="right">?</div>
  </div>

  <div class="grid" id="answers"></div>
  <div class="feedback" id="feedback"></div>
</div>
</div>

<script src="timer.js"></script>
<script>
let current = 0;
let attempts = 0;
let total = 0;
let left = 0;
let right = 0;

const TOTAL = 20;
const QUESTION_TRANSITION_MS = 300;
let stats = { first:0, second:0, third:0, none:0 };
let asked = new Set();





function newQuestion(){
  attempts = 0;

  let key;
  do{
    total = Math.floor(Math.random()*21);
    left = Math.floor(Math.random()*(total+1));
    right = total - left;
    key = total + '-' + left;
  }while(asked.has(key));

  asked.add(key);

  document.getElementById('total').textContent = total;
  document.getElementById('left').textContent = left;
  document.getElementById('right').textContent = '?';

  document.getElementById('counter').textContent =
    'Oefening ' + (current+1) + ' van ' + TOTAL;

  exerciseTimerStart();

  document.getElementById('bar').style.width =
    (current/TOTAL*100)+'%';
}


function revealCorrect(){
  document.getElementById('right').textContent = right;
  document.getElementById('feedback').innerHTML =
    '❌<span class="answer-reveal">Juiste antwoord: ' + right + '</span>';
}

function answer(val){
  attempts++;
  const container = document.querySelector('.container');
  const feedback = document.getElementById('feedback');

  if(val === right){

    exerciseTimerStop();

    if(attempts <= 3){
      if(exerciseTimer.answeredWithinTime)
        exerciseTimer.stats.correctWithinTime++;
      else
        exerciseTimer.stats.correctOutsideTime++;
    }
    if(attempts===1) stats.first++;
    if(attempts===2) stats.second++;
    if(attempts===3) stats.third++;

    document.getElementById('right').textContent = val;

    feedback.innerHTML = '✅';
    feedback.className = 'feedback correct';
    container.classList.add('flash-correct');

    setTimeout(()=>{
      container.classList.remove('flash-correct');
      setTimeout(nextQuestion, QUESTION_TRANSITION_MS);
    }, 800);

  } else {
    feedback.innerHTML = '❌';
    feedback.className = 'feedback wrong';
    container.classList.add('flash-wrong');

    setTimeout(()=>{
      container.classList.remove('flash-wrong');
      feedback.innerHTML = '';
      feedback.className = 'feedback';

      if(attempts >= 3){
        exerciseTimerStop();
        stats.none++;
        revealCorrect();
        setTimeout(()=>{ nextQuestion(); }, 2500 + QUESTION_TRANSITION_MS);
      }
    },600);
  }
}


function nextQuestion(){
  current++;
  if(current>=TOTAL){

    // PERFECTE SCORE
    if(stats.first === TOTAL){
      const timerWrapper = document.querySelector(".exercise-timer-wrapper");
      if(timerWrapper) timerWrapper.style.display = "none";

      document.getElementById('app').innerHTML = `
        <div class="container result-enter" style="display:flex;flex-direction:column;justify-content:space-between;min-height:70vh;">
          <h1 style="font-size:clamp(28px,8vw,48px);margin-top:10px;">
            Geweldig geen enkele fout!
          </h1>

          <div style="font-size:clamp(80px,25vw,180px);margin:20px 0;">
            💰
          </div>

          <div>
            <p style="font-size:clamp(20px,6vw,32px);margin-bottom:20px;">
              Je hebt een euro verdiend!
            </p>

            <div class="actions">
              <button class="primary" onclick="location.reload()">Opnieuw spelen</button>
              <button onclick="window.location.href='index.html'">⬅️ Terug</button>
            </div>
          </div>
        </div>
      `;
      return;
    }

    // NORMALE SAMENVATTING
    const timerWrapper = document.querySelector(".exercise-timer-wrapper");
    if(timerWrapper) timerWrapper.style.display = "none";

    let stars = 1;
    let msg = "Goed geoefend!";
    if(stats.first >= TOTAL*0.9){ stars = 3; msg = "Super gedaan!"; }
    else if(stats.first >= TOTAL*0.8){ stars = 2; msg = "Goed gedaan!"; }
    let starStr = "⭐".repeat(stars);

document.getElementById('app').innerHTML = `
  <div class="container result-enter">
    <div style="text-align:center;margin:10px 0 18px 0;">
      <div style="font-size:48px;">${starStr}</div>
      <div style="font-size:24px;margin-top:0px;">${msg}</div>
    </div>
<br>
        <p style="font-weight:bold">⭐ Meteen juist: ${stats.first}</p>
        <p>🔁 Tweede keer juist: ${stats.second}</p>
        <p>🔁 Derde keer juist: ${stats.third}</p>
        <p>❌ Nog oefenen: ${stats.none}</p>
        <p style="margin-top:0px;">Totaal: ${TOTAL}</p>
<br>
	<p>🐆 Juist binnen tijd: ${exerciseTimer.stats.correctWithinTime}</p>
        <p>🐢 Juist buiten tijd: ${exerciseTimer.stats.correctOutsideTime}</p>

        <div class="actions">
          <button class="primary" onclick="location.reload()">Opnieuw spelen</button>
          <button onclick="window.location.href='index.html'">⬅️ Terug</button>
        </div>
      </div>
    `;
  } else {
    document.getElementById('feedback').textContent='';
    newQuestion();
  }
}



const grid = document.getElementById('answers');

let inputBuffer = "";

function updateDisplay(){
  const el = document.getElementById('right');
  if(el){
    el.textContent = inputBuffer || "?";
  }
}

function addDigit(d){
  if(inputBuffer === "0"){
    inputBuffer = d;
  } else if(inputBuffer.length < 2){
    inputBuffer += d;
  }
  updateDisplay();
}

function backspace(){
  inputBuffer = "";
  updateDisplay();
}

function submitAnswer(){
  if(inputBuffer === "") return;
  const val = parseInt(inputBuffer);
  inputBuffer = "";
  updateDisplay();
  answer(val);
}

// Build numpad
const layout = [
  ['7','8','9'],
  ['4','5','6'],
  ['1','2','3'],
  ['⌫','0','✔']
];

layout.flat().forEach(key=>{
  const btn = document.createElement('button');

  if(key === '⌫'){
    btn.textContent = '⌫';
    btn.style.background = '#fecaca';
    btn.onclick = backspace;
  } else if(key === '✔'){
    btn.textContent = '✔';
    btn.style.background = '#bbf7d0';
    btn.onclick = submitAnswer;
  } else {
    btn.textContent = key;
    btn.onclick = ()=>addDigit(key);
  }

  grid.appendChild(btn);
});

function newQuestionWrapper(){
  inputBuffer = "";
  newQuestion();
  updateDisplay();
}

newQuestionWrapper();

</script>
  </body>
</html>
