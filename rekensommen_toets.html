<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rekensommen Toets 0-20</title>

<style>
:root{
  --bg:#f3f4f6;
  --card:#ffffff;
  --accent:#4f46e5;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui,sans-serif;
  background:var(--bg);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:16px;
}

.container{
  width:100%;
  max-width:520px;
  background:var(--card);
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
  padding:24px;
  text-align:center;
}

.progress{
  background:#e5e7eb;
  border-radius:10px;
  overflow:hidden;
  height:12px;
  margin-bottom:8px;
}

.bar{
  background:var(--accent);
  height:100%;
  width:0%;
  transition:width .3s;
}

#counter{
  font-size:16px;
  margin-bottom:10px;
}

#question{
  font-size:48px;
  font-weight:700;
  margin:12px 0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-top:14px;
}

button{
  font-size:22px;
  padding:16px;
  border-radius:16px;
  border:none;
  background:#e5e7eb;
}

.actions{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:20px;
}

button.primary{
  background:#c7d2fe;
}

.wrong{color:#dc2626;font-weight:600;}
.correct{color:#16a34a;font-weight:600;}
</style>
</head>

<body>

<div class="container" id="app">
  <div class="progress"><div class="bar" id="bar"></div></div>
  <div id="counter"></div>
  <div id="question"></div>
  <div class="grid" id="answers"></div>
</div>

<script>
const TOTAL = 10;
let current = 0;
let correctCount = 0;
let result = 0;
let currentA = 0, currentB = 0, currentOp = "";
let mistakes = [];
let asked = new Set();

function newQuestion(){
  inputBuffer='';
  updateDisplay();
  let a,b,isPlus,key;
  do{
    a = Math.floor(Math.random()*21);
    b = Math.floor(Math.random()*21);
    isPlus = Math.random() > 0.5;
    result = isPlus ? a+b : a-b;
    key = a + "-" + (isPlus?"+":"-") + "-" + b;
  }while(result<0 || result>20 || asked.has(key));

  asked.add(key);
  currentA = a; currentB = b; currentOp = isPlus ? "+" : "-";

  document.getElementById("question").innerHTML =
    a + (isPlus?" + ":" - ") + b + " = <span id=\"inputDisplay\">_</span>";

  document.getElementById("counter").textContent =
    "Vraag " + (current+1) + " van " + TOTAL;

  document.getElementById("bar").style.width =
    (current/TOTAL*100) + "%";
}

function answer(val){
  if(val === result){
    correctCount++;
  }else{
    mistakes.push({
      a: currentA, op: currentOp, b: currentB,
      given: val,
      correct: result
    });
  }

  current++;

  if(current>=TOTAL) showResult();
  else newQuestion();
}

function showResult(){
  let percent = Math.round((correctCount/TOTAL)*100);
  let mistakesHtml = "";

  if(mistakes.length>0){
    mistakesHtml = "<h3>Fouten:</h3>";
    mistakes.forEach(m=>{
      mistakesHtml += `
        <div>
          ${m.a} ${m.op} ${m.b} = 
          <span class="wrong">${m.given}</span>
          → 
          <span class="correct">${m.correct}</span>
        </div>`;
    });
  }

  document.getElementById("app").innerHTML = `
    <h1>📝 Toets afgerond</h1>
    <h2>${correctCount} / ${TOTAL}</h2>
    <p>${percent}%</p>
    ${mistakesHtml}
    <div class="actions">
      <button class="primary" onclick="location.reload()">Opnieuw</button>
      <button onclick="window.location.href='index.html'">⬅️ Terug</button>
    </div>
  `;
}

const grid = document.getElementById("answers");

let inputBuffer = "";

function updateDisplay(){
  const el = document.getElementById('inputDisplay');
  if(el) el.textContent = inputBuffer || "_";
}

function addDigit(d){
  if(inputBuffer === "0"){
    inputBuffer = d;
  } else if(inputBuffer.length < 2){
    inputBuffer += d;
  }
  updateDisplay();
}

function backspace(){
  inputBuffer = "";
  updateDisplay();
}

function submitAnswer(){
  if(inputBuffer === "") return;
  const val = parseInt(inputBuffer);
  inputBuffer = "";
  updateDisplay();
  answer(val);
}

(function(){
  const layout = [
    ['7','8','9'],
    ['4','5','6'],
    ['1','2','3'],
    ['⌫','0','✔']
  ];

  layout.flat().forEach(key=>{
    const btn = document.createElement("button");

    if(key === '⌫'){
      btn.textContent = '⌫';
      btn.style.background = '#fecaca';
      btn.onclick = backspace;
    } else if(key === '✔'){
      btn.textContent = '✔';
      btn.style.background = '#bbf7d0';
      btn.onclick = submitAnswer;
    } else {
      btn.textContent = key;
      btn.onclick = ()=>addDigit(key);
    }

    grid.appendChild(btn);
  });
})();



newQuestion();
</script>

</body>
</html>
